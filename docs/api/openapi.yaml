openapi: 3.1.0
info:
  title: ClipKeep API
  version: 0.3.0
servers:
  - url: /api/v1
paths:
  /extract/prepare:
    post:
      summary: Validate URL and create extraction job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, platform]
              properties:
                url:
                  type: string
                  format: uri
                platform:
                  type: string
                  enum: [telegram, twitter, tiktok, x]
                locale:
                  type: string
                  enum: [en, ar]
      responses:
        '202':
          description: Accepted
        '400':
          description: Bad request
        '503':
          description: Service degraded
  /extract/jobs/{jobId}:
    get:
      summary: Poll extraction status/result
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job state
        '404':
          description: Job not found
  /solution-pages/{slug}:
    get:
      summary: Get localized solution page
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: query
          name: locale
          required: false
          schema:
            type: string
            enum: [en, ar]
      responses:
        '200':
          description: Solution page
        '404':
          description: Not found
  /health:
    get:
      summary: Service health
      responses:
        '200':
          description: Health state