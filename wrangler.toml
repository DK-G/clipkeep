name = "clipkeep-web"
main = "src/worker.ts"
compatibility_date = "2026-03-22"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
# pages_build_output_dir = ".open-next"

[assets]
directory = ".open-next/assets"
binding = "STATIC_ASSETS"

[[d1_databases]]
binding = "clipkeep_db"
database_name = "clipkeep-db"
database_id = "0c387dce-97de-4d50-922f-445f4ec3b705"
migrations_dir = "migrations"

[vars]
NEXT_PUBLIC_SITE_URL = "https://clipkeep.net"
NEXT_PUBLIC_GA_ID = "G-EDYDTJMPK6"
RATE_LIMIT_DO_ENDPOINT = "https://clipkeep-rate-limit.liminality-3110.workers.dev"
RATE_LIMIT_LIMIT = "30"
RATE_LIMIT_WINDOW_MS = "60000"
NEXT_PUBLIC_TURNSTILE_SITE_KEY = "0x4AAAAAACvkzgdZA8KipZXs"
# TURNSTILE_SECRET_KEY is managed as a Secret in Cloudflare Dashboard

[browser]
binding = "browser_rendering"

[triggers]
crons = ["0 * * * *"] # Every hour
